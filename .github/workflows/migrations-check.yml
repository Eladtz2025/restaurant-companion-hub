name: Migrations Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrations-dry-run:
    name: Dry-run migrations against staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dry-run migration diff
        id: diff
        run: |
          DIFF=$(supabase db diff --linked 2>&1 || true)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment diff on PR
        uses: actions/github-script@v9
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            const body = diff.trim()
              ? `## Migration Diff (staging)\n\`\`\`sql\n${diff}\n\`\`\``
              : '## Migration Diff (staging)\n_No schema changes detected against staging._';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
